<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amınoğlu Barkod Kurtarıcı</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background-color: #f4f7f6; font-family: sans-serif; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #2c3e50; border: none; padding: 12px; font-weight: bold; }
        .result-box { background-color: white; border-radius: 10px; padding: 20px; margin-top: 20px; display: none; text-align: center; }
        #qrcode img { margin: 0 auto; border: 10px solid white; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <h3 class="text-center mb-4 text-primary">Amınoğlu Barkod Kurtarıcı 🛠️</h3>
                
                <div class="mb-3">
                    <label class="form-label">Hasarlı Barkod Numarası</label>
                    <input type="text" id="barkodNo" class="form-control form-control-lg" placeholder="Örn: B1260026122" autofocus>
                </div>

                <button onclick="barkodOlustur()" class="btn btn-primary w-100 mt-3">YENİ KAREKOD OLUŞTUR</button>

                <div id="sonucAlani" class="result-box">
                    <h5 class="mb-3 text-secondary">Terminal İçin Yeni Kod:</h5>
                    <div id="qrcode"></div>
                    <p class="mt-3 fw-bold text-primary" id="olusturulanNo"></p>
                    <small class="text-muted">Telefon ekranını terminale tutun.</small>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function barkodOlustur() {
        const barkodNo = document.getElementById('barkodNo').value.trim();

        if (!barkodNo) {
            alert("Lütfen bir barkod numarası girin!");
            return;
        }

        // Varsa eski karekodu temizle
        document.getElementById('qrcode').innerHTML = "";

        // Yeni Karekod Oluştur
        var qrcode = new QRCode(document.getElementById("qrcode"), {
            text: barkodNo,
            width: 256,
            height: 256,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H // En yüksek hata düzeltme (Terminal için)
        });

        // Sonuç alanını göster
        document.getElementById('sonucAlani').style.display = 'block';
        document.getElementById('olusturulanNo').innerText = barkodNo;
    }
</script>

</body>
</html>
