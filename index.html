<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amınoğlu Metal Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bc-pdf417@1.0.1/dist/bc-pdf417.min.js"></script>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: sans-serif; }
        .nav-pills .nav-link { color: #aaa; border-radius: 10px; margin: 5px; background: #222; }
        .nav-pills .nav-link.active { background-color: #ff4757 !important; color: white; }
        .card { background-color: #1e1e1e; border: 1px solid #333; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn-action { background-color: #ff4757; border: none; padding: 15px; font-weight: bold; border-radius: 12px; font-size: 1.1rem; }
        .barcode-area { background: white; padding: 15px; border-radius: 10px; display: inline-block; margin-top: 20px; text-align: center; }
        #pdf417Canvas { max-width: 100%; }
    </style>
</head>
<body>

<div class="container py-4">
    <h2 class="text-center mb-4" style="color: #ff4757; font-weight: 800;">AMINOĞLU PORTAL v2 🛠️</h2>

    <ul class="nav nav-pills justify-content-center mb-4" id="pills-tab" role="tablist">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#tab1">İçtaş (QR)</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab2">İdris (PDF417)</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab3">Adet Hesapla</button></li>
    </ul>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="tab1">
            <div class="card p-4">
                <h4 class="text-center mb-3">İçtaş Barkod Kurtarıcı</h4>
                <div class="mb-3">
                    <input type="text" id="ictasNo" class="form-control form-control-lg text-center" placeholder="Örn: B1260026122" autofocus>
                </div>
                <button onclick="olusturQR()" class="btn btn-action w-100">QR KAREKOD ÜRET 🚀</button>
                <div id="qrSonuc" class="text-center" style="display:none; background: #2a2a2a; padding: 20px; border-radius: 15px; margin-top:15px;">
                    <div id="qrcode" class="barcode-area"></div>
                    <h3 id="ictasNoDisplay" class="mt-3 text-warning"></h3>
                </div>
            </div>
        </div>

        <div class="tab-pane fade" id="tab2">
            <div class="card p-4">
                <h4 class="text-center mb-3">İdris Barkod Kurtarıcı</h4>
                <div class="mb-3">
                    <input type="text" id="idrisNo" class="form-control form-control-lg text-center" placeholder="Örn: ER0018274">
                </div>
                <button onclick="olusturPDF417()" class="btn btn-action w-100">İDRİS BARKODU ÜRET 🚀</button>
                <div id="pdf417Sonuc" class="text-center" style="display:none; background: #2a2a2a; padding: 20px; border-radius: 15px; margin-top:15px;">
                    <div class="barcode-area">
                        <canvas id="pdf417Canvas"></canvas>
                    </div>
                    <h3 id="idrisNoDisplay" class="mt-3 text-warning"></h3>
                </div>
            </div>
        </div>

        <div class="tab-pane fade" id="tab3">
            <div class="card p-4">
                <h4 class="text-center mb-3">Demir Hesaplayıcı</h4>
                <div class="mb-3"><label>Çap (mm)</label><select id="cap" class="form-select"></select></div>
                <div class="mb-3"><label>Boy (m)</label><select id="boy" class="form-select"></select></div>
                <div class="mb-3"><label>Tonaj (Ton)</label><input type="number" id="tonaj" class="form-control" step="0.001"></div>
                <button onclick="hesaplaAdet()" class="btn btn-action w-100">HESAPLA</button>
                <div id="hesapSonuc" class="mt-3 text-center" style="display:none; font-size: 1.5rem; color: #ff4757; font-weight: bold;"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Listeleri Doldur
    const capS = document.getElementById('cap');
    const boyS = document.getElementById('boy');
    for (let i = 8; i <= 20; i += 0.5) capS.options.add(new Option(i + " mm", i));
    for (let i = 22; i <= 50; i += 2) capS.options.add(new Option(i + " mm", i));
    for (let i = 6; i <= 18; i++) boyS.options.add(new Option(i + " m", i));

    // İçtaş (QR)
    function olusturQR() {
        const no = document.getElementById('ictasNo').value.trim();
        if(!no) { alert("Numarayı yaz hele!"); return; }
        const qrDiv = document.getElementById('qrcode');
        qrDiv.innerHTML = "";
        new QRCode(qrDiv, { text: no, width: 220, height: 220, correctLevel: QRCode.CorrectLevel.H });
        document.getElementById('qrSonuc').style.display = 'block';
        document.getElementById('ictasNoDisplay').innerText = no;
        document.activeElement.blur(); // Klavyeyi kapat
    }

    // İdris (PDF417) - YENİ FONKSİYON!
    function olusturPDF417() {
        const no = document.getElementById('idrisNo').value.trim();
        if(!no) { alert("İdris numarasını yaz!"); return; }
        const canvas = document.getElementById('pdf417Canvas');
        
        try {
            // PDF417 Barkodunu Canvas üzerine çiz
            PDF417.draw(no, canvas, 2, 2); // (Metin, Canvas, Çizgi Kalınlığı, Çizgi Yüksekliği)
            document.getElementById('pdf417Sonuc').style.display = 'block';
            document.getElementById('idrisNoDisplay').innerText = no;
            document.activeElement.blur(); // Klavyeyi kapat
        } catch (e) {
            alert("Barkod oluşturulamadı! Numara formatını kontrol et.");
        }
    }

    function hesaplaAdet() {
        const c = parseFloat(document.getElementById('cap').value);
        const b = parseFloat(document.getElementById('boy').value);
        const t = parseFloat(document.getElementById('tonaj').value);
        const birim = (c * c) / 162.15;
        const sonuc = Math.floor((t * 1000) / (b * birim));
        document.getElementById('hesapSonuc').style.display = 'block';
        document.getElementById('hesapSonuc').innerText = sonuc + " ADET";
    }
</script>
</body>
</html>
